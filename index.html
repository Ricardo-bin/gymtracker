<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0A0A0F">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>GymTracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="topbar">
    <span class="topbar-logo">GymTracker</span>
    <span class="topbar-date" id="topbar-date"></span>
  </div>
  <div id="toast"></div>

  <!-- ══ WORKOUT ═══════════════════════════════════════════════════════════ -->
  <div id="section-workout" class="section">
    <div id="workout-content"><div class="loading-row">Loading...</div></div>
  </div>

  <!-- ══ FOOD ══════════════════════════════════════════════════════════════ -->
  <div id="section-food" class="section">

    <!-- Macro summary -->
    <div class="macros-summary">
      <div class="macro-card">
        <div class="macro-label">PROTEIN TODAY</div>
        <div class="macro-val"><span id="daily-protein">0</span><span class="macro-val-unit"> g</span></div>
        <div class="macro-unit" id="prot-target-label">target 134g</div>
        <div class="prot-bar-wrap"><div class="prot-bar-fill" id="prot-bar-fill"></div></div>
        <div class="prot-pct-label"><span id="prot-pct">0%</span></div>
      </div>
      <div class="macro-card">
        <div class="macro-label">CALORIES TODAY</div>
        <div class="macro-val"><span id="daily-cal">0</span></div>
        <div class="macro-unit" id="cal-target-label">target ~2,550 kcal</div>
      </div>
    </div>

    <!-- Quick-add food grid -->
    <div class="food-section-label">QUICK ADD</div>
    <div id="food-quick-grid" class="food-quick-grid"></div>
    <div class="quick-total" id="quick-total"></div>
    <button class="btn-primary" id="btn-log-quick" style="margin-bottom:18px">Log selected foods</button>

    <!-- Manual entry -->
    <div class="food-section-label">CUSTOM ENTRY</div>
    <div class="food-input-card">
      <label class="input-label" for="food-name">FOOD NAME</label>
      <input type="text" id="food-name" class="input-full" placeholder="e.g. Paneer curry" autocomplete="off">
      <div class="input-row">
        <div>
          <label class="input-label" for="food-protein">PROTEIN (g)</label>
          <input type="number" id="food-protein" class="input-full" placeholder="e.g. 20" min="0" step="0.5" inputmode="decimal">
        </div>
        <div>
          <label class="input-label" for="food-cal">CALORIES</label>
          <input type="number" id="food-cal" class="input-full" placeholder="e.g. 250" min="0" inputmode="numeric">
        </div>
      </div>
      <button class="btn-primary" id="btn-add-food">Add meal</button>
    </div>

    <div class="food-log-title">TODAY'S LOG</div>
    <div id="food-log-list"><div class="loading-row">Loading...</div></div>
  </div>

  <!-- ══ HISTORY ════════════════════════════════════════════════════════════ -->
  <div id="section-history" class="section">
    <div class="section-header">
      <span class="section-title">History</span>
    </div>

    <!-- Range buttons -->
    <div class="hist-range-row">
      <button class="hist-range-btn active" data-days="14" onclick="setHistoryDays(14)">14 days</button>
      <button class="hist-range-btn" data-days="30" onclick="setHistoryDays(30)">30 days</button>
      <button class="hist-range-btn" data-days="90" onclick="setHistoryDays(90)">90 days</button>
      <button class="hist-range-btn" data-days="365" onclick="setHistoryDays(365)">All</button>
    </div>

    <div class="history-tabs">
      <button class="history-tab active" id="htab-workouts" onclick="switchHistoryTab('workouts')">Workouts</button>
      <button class="history-tab" id="htab-food" onclick="switchHistoryTab('food')">Food</button>
    </div>
    <div id="history-panel-workouts" class="history-panel active">
      <div id="history-workouts"><div class="loading-row">Loading...</div></div>
    </div>
    <div id="history-panel-food" class="history-panel">
      <div id="history-food"><div class="loading-row">Loading...</div></div>
    </div>
  </div>

  <!-- ══ WATER ══════════════════════════════════════════════════════════════ -->
  <div id="section-water" class="section">
    <div class="section-header">
      <span class="section-title">Water</span>
      <span class="section-sub">Daily hydration</span>
    </div>
    <div id="water-content"><div class="loading-row">Loading...</div></div>
  </div>

  <!-- ══ SETTINGS ══════════════════════════════════════════════════════════ -->
  <div id="section-settings" class="section">
    <div class="section-header">
      <span class="section-title">Settings</span>
    </div>
    <div id="settings-content"><div class="loading-row">Loading...</div></div>
  </div>

  <!-- ══ BOTTOM NAV ════════════════════════════════════════════════════════ -->
  <nav id="bottom-nav">
    <button class="nav-btn active" id="nav-workout">
      <span class="nav-icon">🏋️</span><span>Workout</span>
    </button>
    <button class="nav-btn" id="nav-food">
      <span class="nav-icon">🍽️</span><span>Food</span>
    </button>
    <button class="nav-btn" id="nav-history">
      <span class="nav-icon">📅</span><span>History</span>
    </button>
    <button class="nav-btn" id="nav-water">
      <span class="nav-icon">💧</span><span>Water</span>
    </button>
    <button class="nav-btn" id="nav-settings">
      <span class="nav-icon">⚙️</span><span>Settings</span>
    </button>
  </nav>

  <script>
    document.getElementById("topbar-date").textContent =
      new Date().toLocaleDateString("en-IN",{weekday:"short",day:"numeric",month:"short"});

    function switchHistoryTab(tab) {
      ["workouts","food"].forEach(t=>{
        document.getElementById(`htab-${t}`).classList.toggle("active",t===tab);
        document.getElementById(`history-panel-${t}`).classList.toggle("active",t===tab);
      });
    }
    window.switchHistoryTab = switchHistoryTab;
  </script>
  <script type="module" src="app.js"></script>
</body>
</html>
