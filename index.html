<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0A0A0F">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>GymTracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── Top bar ─────────────────────────────────────────────── -->
  <div id="topbar">
    <span class="topbar-logo">GymTracker</span>
    <span class="topbar-date" id="topbar-date"></span>
  </div>

  <!-- ── Toast notification ──────────────────────────────────── -->
  <div id="toast"></div>

  <!-- ══════════════════════════════════════════════════════════
       SECTION: WORKOUT
  ══════════════════════════════════════════════════════════════ -->
  <div id="section-workout" class="section">
    <div id="workout-content">
      <div class="loading-row">Loading workout…</div>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════════════════
       SECTION: FOOD
  ══════════════════════════════════════════════════════════════ -->
  <div id="section-food" class="section">

    <!-- Daily totals -->
    <div class="macros-summary">
      <div class="macro-card">
        <div class="macro-label">PROTEIN TODAY</div>
        <div class="macro-val"><span id="daily-protein">0</span><span style="font-size:.9rem;color:var(--text3)"> g</span></div>
        <div class="macro-unit">target 120–140 g</div>
        <div class="prot-bar-wrap">
          <div class="prot-bar-fill" id="prot-bar-fill"></div>
        </div>
        <div class="prot-pct-label"><span id="prot-pct">0%</span></div>
      </div>
      <div class="macro-card">
        <div class="macro-label">CALORIES TODAY</div>
        <div class="macro-val"><span id="daily-cal">0</span></div>
        <div class="macro-unit">target ~2,500 kcal</div>
      </div>
    </div>

    <!-- Add food form -->
    <div class="food-input-card">
      <label class="input-label" for="food-name">FOOD NAME</label>
      <input type="text" id="food-name" class="input-full" placeholder="e.g. Chicken + Rice" autocomplete="off">
      <div class="input-row">
        <div>
          <label class="input-label" for="food-protein">PROTEIN (g)</label>
          <input type="number" id="food-protein" class="input-full" placeholder="e.g. 31" min="0" step="0.5">
        </div>
        <div>
          <label class="input-label" for="food-cal">CALORIES (optional)</label>
          <input type="number" id="food-cal" class="input-full" placeholder="e.g. 380" min="0" step="1">
        </div>
      </div>
      <button class="btn-primary" id="btn-add-food">Add meal</button>
    </div>

    <!-- Today's log -->
    <div class="food-log-title">TODAY'S LOG</div>
    <div id="food-log-list">
      <div class="loading-row">Loading…</div>
    </div>

  </div>

  <!-- ══════════════════════════════════════════════════════════
       SECTION: HISTORY
  ══════════════════════════════════════════════════════════════ -->
  <div id="section-history" class="section">
    <div class="section-header">
      <span class="section-title">History</span>
      <span class="section-sub">Last 14 days</span>
    </div>

    <!-- Tabs -->
    <div class="history-tabs">
      <button class="history-tab active" id="htab-workouts"
        onclick="switchHistoryTab('workouts')">Workouts</button>
      <button class="history-tab" id="htab-food"
        onclick="switchHistoryTab('food')">Food</button>
    </div>

    <div id="history-panel-workouts" class="history-panel active">
      <div id="history-workouts"><div class="loading-row">Loading…</div></div>
    </div>
    <div id="history-panel-food" class="history-panel">
      <div id="history-food"><div class="loading-row">Loading…</div></div>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════════════════
       SECTION: PDF VIEWER
  ══════════════════════════════════════════════════════════════ -->
  <div id="section-pdf" class="section">
    <div class="section-header">
      <span class="section-title">Plan PDF</span>
    </div>
    <div id="pdf-frame-wrap">
      <iframe
        id="pdf-frame"
        src="plan.pdf"
        title="Transformation Plan"
        aria-label="Gym transformation PDF plan"
      ></iframe>
      <div class="pdf-note">
        Rename your PDF to <strong>plan.pdf</strong> and place it in the same folder.
      </div>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════════════════
       BOTTOM NAV
  ══════════════════════════════════════════════════════════════ -->
  <nav id="bottom-nav">
    <button class="nav-btn active" id="nav-workout">
      <span class="nav-icon">🏋️</span>
      <span>Workout</span>
    </button>
    <button class="nav-btn" id="nav-food">
      <span class="nav-icon">🍽️</span>
      <span>Food</span>
    </button>
    <button class="nav-btn" id="nav-history">
      <span class="nav-icon">📅</span>
      <span>History</span>
    </button>
    <button class="nav-btn" id="nav-pdf">
      <span class="nav-icon">📄</span>
      <span>Plan</span>
    </button>
  </nav>

  <!-- ── Scripts ─────────────────────────────────────────────── -->
  <script>
    // Topbar date
    document.getElementById("topbar-date").textContent =
      new Date().toLocaleDateString("en-IN", { weekday:"short", day:"numeric", month:"short" });

    // History tab switcher (inline to avoid module scope issue)
    function switchHistoryTab(tab) {
      ["workouts","food"].forEach(t => {
        document.getElementById(`htab-${t}`).classList.toggle("active", t === tab);
        document.getElementById(`history-panel-${t}`).classList.toggle("active", t === tab);
      });
    }
    window.switchHistoryTab = switchHistoryTab;
  </script>

  <script type="module" src="app.js"></script>

</body>
</html>
